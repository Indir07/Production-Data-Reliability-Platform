name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff==0.4.9

      - name: Lint
        run: ruff check services/ --output-format=github

  # ── Unit + Integration Tests ────────────────────────────────────────────────
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: services/api/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r services/api/requirements.txt
          pip install pytest-anyio anyio

      - name: Run tests
        working-directory: services/api
        env:
          ENVIRONMENT: test
          DATABASE_URL: "postgresql+asyncpg://pdrp:pdrp_secret@localhost:5432/pdrp"
          REDIS_URL: "redis://localhost:6379/0"
          SECRET_KEY: "ci-test-secret"
        run: pytest tests/ -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: services/api/.pytest_cache

  # ── Security Scan ───────────────────────────────────────────────────────────
  security:
    name: Security (bandit + safety)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install bandit safety

      - name: Run bandit (SAST)
        working-directory: services/api
        run: bandit -r app -ll -q --configfile .bandit

      - name: Run safety (dependency CVE check)
        run: safety check -r services/api/requirements.txt --bare

  # ── Docker Build ────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: services/api
          file: services/api/Dockerfile
          push: false
          tags: pdrp/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
