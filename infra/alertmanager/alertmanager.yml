# ─────────────────────────────────────────────────────────────────────────────
# Alertmanager Configuration
# FREE replacement for PagerDuty (Apache 2.0)
#
# Handles: deduplication, grouping, silencing, routing
# Docs: https://prometheus.io/docs/alerting/latest/configuration/
#
# To use Slack alerts: set SLACK_WEBHOOK_URL in .env
# To use email alerts: configure smtp_* fields with Gmail or Brevo (free)
# ─────────────────────────────────────────────────────────────────────────────

global:
  resolve_timeout: 5m
  # Free SMTP options:
  # - Gmail: smtp.gmail.com:587 (use App Password, not account password)
  # - Brevo: smtp-relay.brevo.com:587 (free tier: 300 emails/day)
  smtp_from: "pdrp-alerts@example.com"
  smtp_smarthost: "mailhog:1025"  # MailHog in dev — catches emails in UI
  smtp_require_tls: false

# ── Routing ───────────────────────────────────────────────────────────────────
route:
  # Group alerts by check type and table to avoid alert storms
  group_by: ["check_type", "table", "alertname"]
  group_wait: 30s          # Wait before sending first notification
  group_interval: 5m       # Wait before sending notification for new alerts in group
  repeat_interval: 4h      # Repeat if still firing after this time
  receiver: "slack-default"

  routes:
    # CRITICAL alerts get their own immediate route
    - match:
        severity: critical
      receiver: "slack-critical"
      repeat_interval: 1h

    # MEDIUM and LOW go to email digest only
    - match_re:
        severity: "medium|low"
      receiver: "email-digest"

# ── Receivers ─────────────────────────────────────────────────────────────────
receivers:
  # Default Slack channel for HIGH alerts
  - name: "slack-default"
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#data-alerts"
        send_resolved: true
        title: >-
          [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}]
          {{ .CommonLabels.alertname }}
        text: >-
          {{ range .Alerts }}
          *Table:* {{ .Labels.table }}
          *Check:* {{ .Labels.check_type }}
          *Message:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          {{ end }}
        color: >-
          {{ if eq .Status "firing" }}danger{{ else }}good{{ end }}

  # CRITICAL Slack channel — separate from default to avoid noise
  - name: "slack-critical"
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#data-critical"
        send_resolved: true
        title: "🚨 CRITICAL: {{ .CommonLabels.alertname }}"
        text: >-
          {{ range .Alerts }}
          *Table:* {{ .Labels.table }}
          *Check:* {{ .Labels.check_type }}
          *Details:* {{ .Annotations.description }}
          {{ end }}

  # Email digest for lower-severity alerts
  # In dev: caught by MailHog at http://localhost:8025
  - name: "email-digest"
    email_configs:
      - to: "data-team@example.com"
        send_resolved: false
        headers:
          Subject: "[PDRP] Data Quality Alert: {{ .CommonLabels.alertname }}"

# ── Inhibition rules ──────────────────────────────────────────────────────────
# Suppress lower-severity alerts when a CRITICAL is already firing for the same table
inhibit_rules:
  - source_match:
      severity: critical
    target_match_re:
      severity: "high|medium|low"
    equal: ["table"]
